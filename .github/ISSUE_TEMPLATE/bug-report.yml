name: Bug report
description: Report a reproducible problem in reveal-ui
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include a minimal reproduction if possible.
  - type: input
    id: version
    attributes:
      label: reveal-ui version
      description: Which version are you using?
      placeholder: 0.2.0
    validations:
      required: true
  - type: input
    id: react-version
    attributes:
      label: React version
      description: Which React version are you using?
      placeholder: 19.2.4
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Share a GitHub repo, StackBlitz, CodeSandbox, or the smallest code sample that reproduces the problem.
      placeholder: Minimal reproduction details
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include browser, framework, motion settings, accessibility context, or screenshots if they help.
